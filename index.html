<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aflacha Rachmata — Coming Soon</title>
  <meta name="description" content="Personal brand & portfolio of Aflacha Rachmata — COO, game designer, creator. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0c0c0c;
      --bg-card: #141312;
      --border: #2a1f18;
      --text: #e8dcc8;
      --text-muted: #b8ad9e;
      --accent: #c4953a;
      --accent-glow: rgba(196, 149, 58, 0.15);
      --gradient: linear-gradient(135deg, #c4953a, #d4a84a);
    }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      line-height: 1.6;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(196, 149, 58, 0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(196, 149, 58, 0.04), transparent);
    }
    .container { max-width: 640px; width: 100%; text-align: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1rem; border-radius: 100px;
      background: rgba(196, 149, 58, 0.08);
      border: 1px solid rgba(196, 149, 58, 0.2);
      font-size: 0.8rem; font-weight: 500; color: var(--accent);
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2.5rem;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .initial {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem; font-weight: 700; color: #fff;
      font-family: 'JetBrains Mono', monospace;
      box-shadow: 0 0 40px var(--accent-glow);
    }
    h1 {
      font-size: 2rem; font-weight: 700;
      margin-bottom: 0.75rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h2 {
      font-size: 1.05rem; font-weight: 400;
      color: var(--text-muted); margin-bottom: 2rem;
      line-height: 1.7;
    }
    .divider {
      width: 40px; height: 3px;
      background: var(--gradient); border-radius: 2px;
      margin: 0 auto 1.5rem;
    }
    .social-links {
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem; margin-top: 2rem;
    }
    .social-links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--accent); }
    .footer {
      margin-top: 3rem; font-size: 0.75rem;
      color: rgba(136, 136, 160, 0.5);
      letter-spacing: 0.05em;
    }
    /* Admin link */
    .admin-link {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--text-muted);
      font-size: 1.1rem; transition: all 0.2s;
      z-index: 100;
    }
    .admin-link:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      Under Construction
    </div>
    <div class="initial">A</div>
    <h1>Aflacha Rachmata</h1>
    <div class="divider"></div>
    <h2>
      COO &amp; Co-founder of Artelysium Studios · Game Designer · UX/UI Designer · Producer<br>
      The full portfolio is being assembled. Check back soon.
    </h2>
    <div class="social-links">
      <a href="https://linkedin.com/in/aflacha" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://medium.com/@aflacha" target="_blank" rel="noopener">Medium</a>
      <a href="https://github.com/aflacha" target="_blank" rel="noopener">GitHub</a>
    </div>
    <div class="footer">© 2026 · aflacha.com</div>
  </div>
  <a href="/admin/" class="admin-link" title="CMS" target="_blank" rel="noopener">⚙</a>
  <!-- Netlify Identity (for CMS invite acceptance) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user && window.location.hash.includes('invite_token')) {
          window.netlifyIdentity.on('login', function() {
            window.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
