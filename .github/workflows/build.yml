name: Build Site

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'admin/**'
      - 'template.html'
      - 'build.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build script
        run: python3 build.py

      - name: Commit built index.html
        run: |
          git config --global user.name "JARVIS Bot"
          git config --global user.email "bot@aflacha.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "Auto-build: regenerate index.html from content [skip ci]"
            git push
          fi
