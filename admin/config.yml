backend:
  name: github
  repo: aflacha/aflacha.com
  branch: main
  base_url: https://decap-proxy.aflacha-rach.workers.dev

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "content/settings.md"
        fields:
          - label: "Under Construction Mode"
            name: "under_construction"
            widget: "boolean"
            default: false
            hint: "Toggle ON to show Coming Soon page. Toggle OFF to show full portfolio."
          - label: "Template"
            name: "template_choice"
            widget: "select"
            options:
              - { label: "🧩 Storyboard (Timeline)", value: "storyboard" }
              - { label: "🎮 Dashboard (Grid)", value: "dashboard" }
              - { label: "⬛ Terminal (Editorial)", value: "terminal" }
            default: "storyboard"
            hint: "Which template design to use for the portfolio."

      - name: "site_content"
        label: "Site Content (Global)"
        file: "content/site.md"
        fields:
          - label: "Site Title"
            name: "title"
            widget: "string"
            hint: "Your name, used in Portfolio pages"
          - label: "Meta Description"
            name: "meta_description"
            widget: "text"
          - label: "Favicon Path"
            name: "favicon"
            widget: "string"
            hint: "Path to favicon file, e.g. /images/favicon.svg"
          - label: "Nav Logo"
            name: "nav_logo"
            widget: "string"
            hint: "Single letter/icon in nav bar"
          - label: "Navigation Links"
            name: "nav_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }

          # Hero Section
          - { label: "Hero Badge", name: "hero_badge", widget: "string" }
          - { label: "Hero Name (HTML ok)", name: "hero_name", widget: "string" }
          - { label: "Hero Tagline (HTML ok)", name: "hero_tagline", widget: "text" }
          - label: "Hero Tags"
            name: "hero_tags"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Accent Color?", name: "accent", widget: "boolean", default: false, required: false }
          - { label: "CTA Primary Text", name: "cta_primary_text", widget: "string" }
          - { label: "CTA Primary Href", name: "cta_primary_href", widget: "string" }
          - { label: "CTA Secondary Text", name: "cta_secondary_text", widget: "string" }
          - { label: "CTA Secondary Href", name: "cta_secondary_href", widget: "string" }
          - { label: "Extra Bio (HTML ok)", name: "hero_extra_bio", widget: "text", hint: "Shown after CMS bios." }

          # Section Labels & Titles
          - { label: "About Label", name: "about_label", widget: "string" }
          - { label: "About Title", name: "about_title", widget: "string" }
          - { label: "Services Label", name: "services_label", widget: "string" }
          - { label: "Services Title", name: "services_title", widget: "string" }
          - { label: "Portfolio Label", name: "portfolio_label", widget: "string" }
          - { label: "Portfolio Title (HTML ok)", name: "portfolio_title", widget: "string" }
          - { label: "Writing Label", name: "writing_label", widget: "string" }
          - { label: "Writing Title", name: "writing_title", widget: "string" }
          - { label: "Contact Label", name: "contact_label", widget: "string" }
          - { label: "Contact Title", name: "contact_title", widget: "string" }

          # Writing Card
          - { label: "Writing Card Date", name: "writing_card_date", widget: "string" }
          - { label: "Writing Card Title", name: "writing_card_title", widget: "string" }
          - { label: "Writing Card URL", name: "writing_card_url", widget: "string" }

          # Social Links (Contact)
          - { label: "LinkedIn URL", name: "social_linkedin_url", widget: "string" }
          - { label: "LinkedIn Display Text", name: "social_linkedin_text", widget: "string" }
          - { label: "GitHub URL", name: "social_github_url", widget: "string" }
          - { label: "GitHub Display Text", name: "social_github_text", widget: "string" }

          # Footer
          - { label: "Footer Name", name: "footer_name", widget: "string" }
          - { label: "Footer Text", name: "footer_text", widget: "string" }
          - { label: "Footer Year", name: "footer_year", widget: "string" }

          # Construction Page (Coming Soon)
          - { label: "Construction Page Title", name: "construction_title", widget: "string" }
          - { label: "Construction Meta Description", name: "construction_meta_description", widget: "text" }
          - { label: "Construction Badge Text", name: "construction_badge", widget: "string" }
          - { label: "Construction Heading", name: "construction_heading", widget: "string" }
          - { label: "Construction Description (HTML ok)", name: "construction_description", widget: "text" }
          - { label: "Construction Footer", name: "construction_footer", widget: "string" }

      - name: "about"
        label: "About Section (Bios)"
        file: "content/about.md"
        fields:
          - { label: "Bio Paragraph 1", name: "bio1", widget: "text" }
          - { label: "Bio Paragraph 2", name: "bio2", widget: "text" }
          - { label: "Bio Paragraph 3", name: "bio3", widget: "text" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - label: "Highlight Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Number/Text", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      - name: "services"
        label: "Services"
        file: "content/services.md"
        fields:
          - label: "Services List"
            name: "services"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "portfolio"
        label: "Portfolio"
        file: "content/portfolio.md"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "contact"
        label: "Contact Info"
        file: "content/contact.md"
        fields:
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
