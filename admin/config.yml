backend:
  name: github
  repo: aflacha/aflacha.com
  branch: main
  base_url: https://api.decapcms.org
  auth_endpoint: /auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "content/settings.md"
        fields:
          - label: "Under Construction Mode"
            name: "under_construction"
            widget: "boolean"
            default: false
            hint: "Toggle ON to show Coming Soon page. Toggle OFF to show full portfolio."

      - name: "about"
        label: "About Section"
        file: "content/about.md"
        fields:
          - { label: "Bio Paragraph 1", name: "bio1", widget: "text" }
          - { label: "Bio Paragraph 2", name: "bio2", widget: "text" }
          - { label: "Bio Paragraph 3", name: "bio3", widget: "text" }
          - { label: "Tagline", name: "tagline", widget: "string" }

      - name: "services"
        label: "Services"
        file: "content/services.md"
        fields:
          - label: "Services List"
            name: "services"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "portfolio"
        label: "Portfolio"
        file: "content/portfolio.md"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "contact"
        label: "Contact Info"
        file: "content/contact.md"
        fields:
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
